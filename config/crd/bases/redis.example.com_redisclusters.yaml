                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              nextPodOrdinal:
                description: NextPodOrdinal is the next redis-N ordinal that may be
                  allocated.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent RedisCluster generation
                  handled.
                format: int64
                type: integer
              observedNodes:
                description: ObservedNodes is the last full managed node inventory
                  used for planning.
                items:
                  description: ObservedNode records the current Kubernetes and Redis
                    view of one managed node.
                  properties:
                    deleting:
                      type: boolean
                    flags:
                      items:
                        type: string
                      type: array
                    linkState:
                      type: string
                    masterId:
                      type: string
                    masterPod:
                      type: string
                    nodeId:
                      type: string
                    pod:
                      type: string
                    podExists:
                      type: boolean
                    ready:
                      type: boolean
                    redisSeen:
                      type: boolean
                    role:
                      type: string
                    slots:
                      type: string
                  type: object
                type: array
              topology:
                description: Topology is the last observed Redis Cluster topology.
                properties:
                  shards:
                    items:
                      description: 'ShardTopology describes a single shard: one master
                        and its replicas.'
                      properties:
                        id:
                          description: ID is the shard identifier, e.g. "shard-0".
                          type: string
                        master:
                          description: Master is the master node of this shard.
                          properties:
                            nodeId:
                              description: NodeID is the Redis Cluster node id, discovered
                                from the live cluster.
                              type: string
                            pod:
                              description: Pod is the K8S Pod name hosting this node.
                              type: string
                            ready:
                              description: Ready is true when the Pod is Ready and
                                Redis responds to PING.
                              type: boolean
                            slots:
                              description: Slots is the slot range(s) owned by this
                                node, e.g. "0-8191".
                              type: string
                          type: object
                        replicas:
                          description: Replicas are the replica nodes backing this
                            shard's master.
                          items:
                            description: NodeTopology describes a single Redis node
                              as observed by the controller.
                            properties:
                              nodeId:
                                description: NodeID is the Redis Cluster node id,
                                  discovered from the live cluster.
                                type: string
                              pod:
                                description: Pod is the K8S Pod name hosting this
                                  node.
                                type: string
                              ready:
                                description: Ready is true when the Pod is Ready and
                                  Redis responds to PING.
                                type: boolean
                              slots:
                                description: Slots is the slot range(s) owned by this
                                  node, e.g. "0-8191".
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                type: object
              topologyObservedAt:
                description: TopologyObservedAt is the last time Topology was refreshed
                  from Redis.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
