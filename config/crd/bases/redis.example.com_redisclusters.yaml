---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: redisclusters.redis.example.com
spec:
  group: redis.example.com
  names:
    kind: RedisCluster
    listKind: RedisClusterList
    plural: redisclusters
    shortNames:
    - rcluster
    - rclusters
    singular: rediscluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.shards
      name: Shards
      type: integer
    - jsonPath: .spec.replicasPerShard
      name: Replicas
      type: integer
    - jsonPath: .spec.image
      name: Image
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RedisCluster is the Schema for the redisclusters API. It is cluster-scoped:
          each RedisCluster owns a dedicated namespace whose name equals the cluster name.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RedisClusterSpec defines the desired state of a Redis Cluster.
            properties:
              image:
                description: Image is the Redis container image used for every node.
                minLength: 1
                type: string
              memorySize:
                description: MemorySize is the per-node Redis memory limit, e.g. "2Gi".
                minLength: 1
                type: string
              replicasPerShard:
                description: ReplicasPerShard is the number of replicas for each shard's
                  master. Minimum 1.
                format: int32
                minimum: 1
                type: integer
              shards:
                description: Shards is the number of shards (masters). Minimum 1.
                format: int32
                minimum: 1
                type: integer
            required:
            - image
            - memorySize
            - replicasPerShard
            - shards
            type: object
          status:
            description: RedisClusterStatus defines the observed state of a RedisCluster.
            properties:
              activePlan:
                description: ActivePlan is the plan currently being executed, if any.
                properties:
                  currentStep:
                    description: CurrentStep is the id of the step currently being
                      executed.
                    type: string
                  id:
                    description: ID is the plan identifier.
                    type: string
                  status:
                    enum:
                    - Pending
                    - Running
                    - Completed
                    - Failed
                    - Superseded
                    type: string
                  steps:
                    description: Steps is the ordered list of step states.
                    items:
                      description: StepStatus is the persisted state of a single plan
                        step.
                      properties:
                        action:
                          description: Action is the action type executed by this
                            step.
                          type: string
                        id:
                          description: ID is the step identifier.
                          type: string
                        lastTransitionTime:
                          description: LastTransitionTime is the last time Status
                            changed.
                          format: date-time
                          type: string
                        message:
                          description: Message is a human-readable detail about the
                            step state.
                          type: string
                        params:
                          description: |-
                            Params are the action parameters, persisted as raw JSON so executors can
                            resume after a controller restart without re-querying the planner.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        status:
                          description: 'Status is the execution state: Pending, Running,
                            Completed, Failed.'
                          enum:
                          - Pending
                          - Running
                          - Completed
                          - Failed
                          type: string
                      type: object
                    type: array
                  summary:
                    description: Summary is the human-readable plan summary produced
                      by the planner.
                    type: string
                  targetGeneration:
                    description: TargetGeneration is the RedisCluster generation this
                      plan targets.
                    format: int64
                    type: integer
                type: object
              conditions:
                description: Conditions summarize the cluster's readiness and plan
                  acceptance.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
